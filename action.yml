name: "Gemini AI PR Reviewer"
description: "Full-cycle AI code review including checkout"
author: "Val-d-emar"

branding:
  icon: "code"
  color: "blue"

inputs:
  gemini_api_key:
    description: "API Key from Google AI Studio OR Service Account JSON for Vertex AI"
    required: true
  use_vertexapi_key:
    description: "Set to true if using Vertex AI (GCP Service Account JSON)"
    required: false
    default: "false"
  agent_model:
    description: "Gemini model to use (e.g. 'gemini-1.5-pro', 'flash', 'pro')"
    required: false
    default: "flash"
  github_token:
    description: "GitHub PAT for the reviewer account (needs repo scope)"
    required: false
    default: ${{ github.token }}
  review_prompt:
    description: "Custom prompt for the AI"
    required: false
    default: >
      You are an expert software engineer. Review this git diff for bugs, security, and style. 
      Provide feedback in Markdown. 
      IMPORTANT: Assume all infrastructure versions (like GitHub Actions @v4, @v6, etc.) are valid and exist; do not flag them as incorrect. 
      Focus strictly on the logic, security, and quality of the code changes.
      If okay, approve PR including the text 'RESUME: APPROVE' to end of your response.
  review_language:
    description: "Language for the AI (e.g. 'English', 'Russian')"
    required: false
    default: "English"
  approval_required:
    description: "Require approval from the reviewer (uses --approve or --request-changes)"
    required: false
    default: "false"
  comment_title:
    description:
      "A unique title to prepend to the review, used to find old comments
      for editing."
    required: false
    default: "# 🤖 Gemini AI Code Review"

runs:
  using: "composite"
  steps:
    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ inputs.github_token }}

    - name: Authenticate to Google Cloud
      if: ${{ inputs.use_vertexapi_key == 'true' }}
      uses: google-github-actions/auth@v2
      with:
        credentials_json: "${{ inputs.gemini_api_key }}"

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "24"

    - name: Install Gemini CLI
      run: npm install -g @google/gemini-cli
      shell: bash

    - name: Generate PR Diff
      id: diff
      run: |
        if [ -z "${{ github.event.pull_request.number }}" ]; then
          echo "Error: This action only works on pull_request events."
          exit 1
        fi

        # Используем SHAs для надежности, особенно при работе с форками
        BASE_SHA="${{ github.event.pull_request.base.sha }}"
        HEAD_SHA="${{ github.event.pull_request.head.sha }}"

        git diff $BASE_SHA...$HEAD_SHA > pr_diff.txt

        # Проверяем, не пустой ли дифф, чтобы не дергать API зря
        if [ ! -s pr_diff.txt ]; then
          echo "No changes detected in this PR."
          echo "skip=true" >> $GITHUB_OUTPUT
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Run Gemini Review
      if: steps.diff.outputs.skip == 'false'
      env:
        GOOGLE_GENAI_USE_VERTEXAI: ${{ inputs.use_vertexapi_key }}
        # Устанавливаем оба ключа для совместимости с разными методами авторизации CLI
        GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
        GOOGLE_API_KEY: ${{ inputs.gemini_api_key }}
        USER_PROMPT: ${{ inputs.review_prompt }}
        USER_LANG: ${{ inputs.review_language }}
        MODEL: ${{ inputs.agent_model }}
      run: |
        FULL_PROMPT="Use ${USER_LANG} language for answer. ${USER_PROMPT} Review changes in @pr_diff.txt"

        # Используем headless mode (-p) и указываем модель
        gemini -p "$FULL_PROMPT" --model "$MODEL" > raw_review.md

        printf "%s\n\n" "${{ inputs.comment_title }}" > review_result.md
        cat raw_review.md >> review_result.md

        if [ "${{ inputs.approval_required }}" == "true" ]; then
          if grep -iq "RESUME: APPROVE" review_result.md; then
            echo "APPROVE" > review_status.txt
          else
            echo "REJECT" > review_status.txt
          fi
        fi
      shell: bash

    - name: Submit Feedback to PR
      if: steps.diff.outputs.skip == 'false'
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      shell: bash
      run: |
        # Определяем логин текущего пользователя (PAT или встроенный бот)
        CURRENT_USER=$(gh api user -q .login 2>/dev/null || echo "github-actions[bot]")
        # Если gh api вернул ошибку в формате JSON, сбрасываем на бота
        if [[ "$CURRENT_USER" == *"{"* ]]; then CURRENT_USER="github-actions[bot]"; fi

        # --- ВЕТКА 1: Требуется официальное ревью (Approve/Reject) ---
        if [ "${{ inputs.approval_required }}" == "true" ]; then
          # Мы не удаляем старые ревью (DELETE запрещен API), просто постим новое
          RESUME=$(cat review_status.txt 2>/dev/null || echo "REJECT")
          if [ "$RESUME" == "APPROVE" ]; then
            gh pr review ${{ github.event.pull_request.number }} -R ${{ github.repository }} --approve --body-file review_result.md
          else
            gh pr review ${{ github.event.pull_request.number }} -R ${{ github.repository }} --request-changes --body-file review_result.md
          fi

        # --- ВЕТКА 2: Простой комментарий (с поддержкой редактирования) ---
        else
          # Ищем ID старого комментария с учетом пагинации (до 1000 комментов)
          # Используем внешний jq с --arg, чтобы мусор в логине не ломал синтаксис
          COMMENT_ID=$(gh api --paginate repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments | \
            jq -r --arg u "$CURRENT_USER" --arg t "${{ inputs.comment_title }}" \
            '.[] | select(.user.login == $u and (.body | startswith($t))) | .id' | tail -1)
          
          if [ -n "$COMMENT_ID" ] && [ "$COMMENT_ID" != "null" ]; then
            echo "Editing existing comment ID: $COMMENT_ID"
            gh api --method PATCH /repos/${{ github.repository }}/issues/comments/$COMMENT_ID -F body=@review_result.md
          else
            echo "Creating new comment..."
            gh pr comment ${{ github.event.pull_request.number }} -R ${{ github.repository }} --body-file review_result.md
          fi
        fi
